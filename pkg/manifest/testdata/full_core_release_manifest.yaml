schema: v0
metadata:
  name: "suse-core"
  version: "1.0"
  creationDate: "2000-01-01"
components:
  operatingSystem:
    image:
      base: "registry.com/foo/bar/os-base:6.2"
      iso: "registry.com/foo/bar/installer-iso:6.2"
  systemd:
    extensions:
      - name: "elemental3ctl"
        image: "https://example.com/elemental3ctl_0.0.raw"
        required: true
  kubernetes:
    version: "v1.35.0+rke2r1"
    image: "registry.example.com/rke2:1.35_1.0"
  helm:
    charts:
      - name: "Foo"
        chart: "foo"
        version: "0.0.0"
        namespace: "foo-system"
        repository: "foo-charts"
        values:
          image:
            tag: latest
        dependsOn:
          - name: "baz"
            type: "helm"
        images:
          - name: "foo"
            image: "registry.com/foo/foo:0.0.0"
    repositories:
      - name: "foo-charts"
        url: "https://foo.github.io/charts"
